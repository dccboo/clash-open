port: 7890
socks-port: 7891
mixed-port: 7893
allow-lan: true
mode: rule
log-level: info
ipv6: false

external-controller: 127.0.0.1:9090
unified-delay: true

# ========== 机场订阅（关键：把 url 换成你的机场 Clash 订阅链接） ==========
proxy-providers:
  airport:
    type: http
    url: "机场订阅贴进来"
    interval: 3600
    path: ./providers/airport.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# ========== 分组（按你的 custom_proxy_group 还原） ==========
proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - AutoTest
      - 手动切换
      - 香港节点
      - 日本节点
      - 台湾节点
      - 新加坡节点
      - 美国节点

  - name: Web3
    type: select
    proxies:
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - 香港节点

  - name: ChatGPT
    type: select
    proxies:
      - 美国节点
      - 新加坡节点
      - 日本节点
      - 台湾节点
      - 香港节点

  - name: 手动切换
    type: select
    use:
      - airport

  - name: AutoTest
    type: url-test
    use:
      - airport
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(港|HK|亚洲|Hong Kong|台湾|台|新北|彰化|TW|Taiwan|Coventry|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|新加坡|新|坡|狮城|SG|Singapore|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan|KR|Korea|KOR|首尔|韩|韓|Germany|英|UK|London|Britain|Coventry)"

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - Proxy
      - AutoTest
      - 手动切换
      - DIRECT
      - 香港节点
      - 日本节点
      - 台湾节点
      - 新加坡节点
      - 美国节点

  - name: 🌍 国外媒体
    type: select
    proxies:
      - Proxy
      - AutoTest
      - 手动切换
      - 香港节点
      - 日本节点
      - 台湾节点
      - 新加坡节点
      - 美国节点

  - name: 📹 YouTube
    type: select
    proxies:
      - Proxy
      - AutoTest
      - 手动切换
      - 香港节点
      - 日本节点
      - 台湾节点
      - 新加坡节点
      - 美国节点

  - name: 🍎 Apple
    type: select
    proxies:
      - DIRECT
      - Proxy
      - AutoTest
      - 手动切换
      - 香港节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 台湾节点

  - name: Ⓜ️ OneDrive
    type: select
    proxies:
      - DIRECT
      - Proxy
      - AutoTest
      - 手动切换
      - 香港节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 台湾节点

  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - Proxy
      - DIRECT
      - AutoTest
      - 手动切换
      - 香港节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 台湾节点

  # ========== 节点分类（按你的 url-test 过滤规则） ==========
  - name: 香港节点
    type: url-test
    use: [airport]
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(港|HK|亚洲|Hong Kong)"

  - name: 台湾节点
    type: url-test
    use: [airport]
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(台湾|台|新北|彰化|TW|Taiwan)"

  - name: 日本节点
    type: url-test
    use: [airport]
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan)"

  - name: 英国节点
    type: url-test
    use: [airport]
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(英|UK|London|Britain|Coventry)"

  - name: 美国节点
    type: url-test
    use: [airport]
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)"

  - name: 新加坡节点
    type: url-test
    use: [airport]
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: "(新加坡|新|坡|狮城|SG|Singapore)"

